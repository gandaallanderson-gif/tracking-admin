<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌍 Global Tracking Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .header h1 {
            font-size: 2.5em;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1 i {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-icon {
            width: 60px;
            height: 60px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin-bottom: 15px;
        }

        .stat-icon.purple {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .stat-icon.green {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
        }

        .stat-icon.blue {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: white;
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: 800;
            color: #333;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #666;
            font-weight: 500;
            font-size: 1.1em;
        }

        /* Charts Row */
        .charts-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .chart-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .chart-header h3 {
            font-size: 1.5em;
            font-weight: 700;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chart-header h3 i {
            color: #667eea;
        }

        .chart-wrapper {
            position: relative;
            height: 300px;
        }

        /* Countries Table */
        .table-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 25px;
        }

        .table-header h3 {
            font-size: 1.8em;
            font-weight: 700;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .table-header h3 i {
            color: #667eea;
        }

        .table-stats {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .total-badge {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1em;
        }

        .search-box {
            position: relative;
            width: 300px;
        }

        .search-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .search-box input {
            width: 100%;
            padding: 12px 20px 12px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 50px;
            font-size: 1em;
            outline: none;
            transition: all 0.3s;
        }

        .search-box input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        /* Table Styles */
        .countries-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px;
        }

        .countries-table th {
            text-align: left;
            padding: 15px;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
            font-size: 0.85em;
            letter-spacing: 0.5px;
        }

        .countries-table td {
            padding: 15px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.02);
        }

        .country-cell {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .rank-badge {
            width: 35px;
            height: 35px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.1em;
        }

        .flag-emoji {
            font-size: 1.8em;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.1));
        }

        .country-name {
            font-weight: 600;
            color: #333;
            font-size: 1.1em;
        }

        .clicks-cell {
            font-weight: 700;
            color: #667eea;
            font-size: 1.2em;
        }

        .percentage-cell {
            min-width: 200px;
        }

        .percentage-bar {
            width: 100%;
            height: 8px;
            background: #f0f0f0;
            border-radius: 4px;
            overflow: hidden;
            margin: 8px 0 4px;
        }

        .percentage-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .percentage-text {
            font-size: 0.9em;
            color: #666;
            font-weight: 500;
        }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }

        .loading i {
            font-size: 3em;
            color: #667eea;
            margin-bottom: 15px;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .charts-row {
                grid-template-columns: 1fr;
            }
            
            .table-header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .search-box {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- Header -->
        <div class="header">
            <h1>
                <i class="fas fa-globe-americas"></i>
                Global Tracking Dashboard
            </h1>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon purple">
                        <i class="fas fa-chart-line"></i>
                    </div>
                    <div class="stat-value" id="totalClicks">0</div>
                    <div class="stat-label">Total Clicks</div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon green">
                        <i class="fas fa-calendar-day"></i>
                    </div>
                    <div class="stat-value" id="todayClicks">0</div>
                    <div class="stat-label">Today's Clicks</div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon blue">
                        <i class="fas fa-flag"></i>
                    </div>
                    <div class="stat-value" id="totalCountries">0</div>
                    <div class="stat-label">Countries Reached</div>
                </div>
            </div>
        </div>

        <!-- Charts Row -->
        <div class="charts-row">
            <!-- Daily Chart -->
            <div class="chart-container">
                <div class="chart-header">
                    <h3>
                        <i class="fas fa-chart-bar"></i>
                        Daily Traffic
                    </h3>
                </div>
                <div class="chart-wrapper">
                    <canvas id="dailyChart"></canvas>
                </div>
            </div>

            <!-- Top Countries Chart -->
            <div class="chart-container">
                <div class="chart-header">
                    <h3>
                        <i class="fas fa-trophy"></i>
                        Top 10 Countries
                    </h3>
                </div>
                <div class="chart-wrapper">
                    <canvas id="topCountriesChart"></canvas>
                </div>
            </div>
        </div>

        <!-- All Countries Table -->
        <div class="table-container">
            <div class="table-header">
                <h3>
                    <i class="fas fa-map-marked-alt"></i>
                    All Countries
                </h3>
                
                <div class="table-stats">
                    <div class="total-badge" id="countryCount">
                        <i class="fas fa-globe"></i> 0 Countries
                    </div>
                    
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="Search country..." onkeyup="filterCountries()">
                    </div>
                </div>
            </div>

            <table class="countries-table">
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Country</th>
                        <th>Clicks</th>
                        <th>Percentage</th>
                    </tr>
                </thead>
                <tbody id="countriesTableBody">
                    <!-- Data will be inserted here -->
                </tbody>
            </table>
            
            <div id="noResults" style="display: none; text-align: center; padding: 40px; color: #666;">
                <i class="fas fa-search" style="font-size: 3em; margin-bottom: 15px; opacity: 0.5;"></i>
                <h3>No countries found</h3>
                <p>Try adjusting your search</p>
            </div>
        </div>
    </div>

    <script>
        // Global variables
        let allCountriesData = [];
        let totalClicks = 0;
        let dailyChart, topCountriesChart;

        // Flag emoji mapping
        function getFlagEmoji(countryName) {
            const flags = {
                'Vietnam': '🇻🇳',
                'United States': '🇺🇸',
                'United Kingdom': '🇬🇧',
                'South Korea': '🇰🇷',
                'Japan': '🇯🇵',
                'China': '🇨🇳',
                'France': '🇫🇷',
                'Germany': '🇩🇪',
                'Italy': '🇮🇹',
                'Spain': '🇪🇸',
                'Russia': '🇷🇺',
                'Ukraine': '🇺🇦',
                'Israel': '🇮🇱',
                'Egypt': '🇪🇬',
                'Hong Kong': '🇭🇰',
                'Chile': '🇨🇱',
                'Peru': '🇵🇪',
                'Jordan': '🇯🇴',
                'India': '🇮🇳',
                'Australia': '🇦🇺',
                'Canada': '🇨🇦',
                'Brazil': '🇧🇷',
                'Mexico': '🇲🇽',
                'Indonesia': '🇮🇩',
                'Malaysia': '🇲🇾',
                'Singapore': '🇸🇬',
                'Thailand': '🇹🇭',
                'Philippines': '🇵🇭',
                'Unknown': '🌍'
            };
            return flags[countryName] || '🌍';
        }

        // Load stats
        async function loadStats() {
            try {
                const res = await fetch('/api/stats');
                const data = await res.json();
                
                document.getElementById('totalClicks').innerText = data.total.toLocaleString();
                document.getElementById('todayClicks').innerText = data.today.toLocaleString();
                
                totalClicks = data.total;
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        // Load all countries
        async function loadAllCountries() {
            try {
                const res = await fetch('/api/countries');
                const data = await res.json();
                
                allCountriesData = data;
                
                document.getElementById('totalCountries').innerText = data.length;
                document.getElementById('countryCount').innerHTML = `<i class="fas fa-globe"></i> ${data.length} Countries`;
                
                displayCountries(data);
                updateTopCountriesChart(data);
            } catch (error) {
                console.error('Error loading countries:', error);
            }
        }

        // Display countries in table
        function displayCountries(countries) {
            const tbody = document.getElementById('countriesTableBody');
            const noResults = document.getElementById('noResults');
            
            if (countries.length === 0) {
                tbody.innerHTML = '';
                noResults.style.display = 'block';
                return;
            }
            
            noResults.style.display = 'none';
            tbody.innerHTML = '';
            
            const maxClicks = countries[0][1];
            
            countries.forEach((country, index) => {
                const countryName = country[0];
                const clicks = country[1];
                const percentage = ((clicks / totalClicks) * 100).toFixed(1);
                const flag = getFlagEmoji(countryName);
                
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>
                        <div class="rank-badge">${index + 1}</div>
                    </td>
                    <td>
                        <div class="country-cell">
                            <span class="flag-emoji">${flag}</span>
                            <span class="country-name">${countryName}</span>
                        </div>
                    </td>
                    <td>
                        <span class="clicks-cell">${clicks.toLocaleString()}</span>
                    </td>
                    <td class="percentage-cell">
                        <div class="percentage-bar">
                            <div class="percentage-fill" style="width: ${(clicks / maxClicks) * 100}%;"></div>
                        </div>
                        <span class="percentage-text">${percentage}% of total</span>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        // Filter countries
        function filterCountries() {
            const searchText = document.getElementById('searchInput').value.toLowerCase().trim();
            
            if (!searchText) {
                displayCountries(allCountriesData);
                return;
            }
            
            const filtered = allCountriesData.filter(country => 
                country[0].toLowerCase().includes(searchText)
            );
            
            displayCountries(filtered);
        }

        // Load daily data
        async function loadDailyData() {
            try {
                const res = await fetch('/api/daily');
                const data = await res.json();

                if (dailyChart) {
                    dailyChart.destroy();
                }

                const ctx = document.getElementById('dailyChart').getContext('2d');
                dailyChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: data.map(d => d.date),
                        datasets: [{
                            label: 'Clicks',
                            data: data.map(d => d.count),
                            borderColor: '#667eea',
                            backgroundColor: 'rgba(102, 126, 234, 0.1)',
                            borderWidth: 3,
                            pointBackgroundColor: '#667eea',
                            pointBorderColor: 'white',
                            pointBorderWidth: 2,
                            pointRadius: 5,
                            pointHoverRadius: 7,
                            tension: 0.4,
                            fill: true
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                display: false
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                grid: {
                                    color: 'rgba(0,0,0,0.05)'
                                }
                            },
                            x: {
                                grid: {
                                    display: false
                                }
                            }
                        }
                    }
                });
            } catch (error) {
                console.error('Error loading daily data:', error);
            }
        }

        // Update top countries chart
        function updateTopCountriesChart(countries) {
            const top10 = countries.slice(0, 10);
            
            if (topCountriesChart) {
                topCountriesChart.destroy();
            }

            const ctx = document.getElementById('topCountriesChart').getContext('2d');
            topCountriesChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: top10.map(c => c[0]),
                    datasets: [{
                        data: top10.map(c => c[1]),
                        backgroundColor: [
                            '#667eea', '#764ba2', '#f093fb', '#f5576c', 
                            '#4facfe', '#00f2fe', '#43e97b', '#38f9d7',
                            '#fa709a', '#fee140'
                        ],
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: {
                                color: 'rgba(0,0,0,0.05)'
                            }
                        },
                        x: {
                            grid: {
                                display: false
                            }
                        }
                    }
                }
            });
        }

        // Auto-refresh data every 30 seconds
        function startAutoRefresh() {
            setInterval(() => {
                loadStats();
                loadAllCountries();
                loadDailyData();
            }, 30000);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadStats();
            loadAllCountries();
            loadDailyData();
            startAutoRefresh();
        });
    </script>
</body>
</html>
