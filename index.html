<!DOCTYPE html>
<html>
<head>
  <title>Tracking Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      margin:0;
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: white;
    }

    .container {
      padding:40px;
    }

    h1 {
      margin-bottom:30px;
      font-weight:600;
    }

    .cards {
      display:grid;
      grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
      margin-bottom:40px;
    }

    .card {
      background: linear-gradient(145deg,#1e293b,#0f172a);
      padding:25px;
      border-radius:15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    .card h2 {
      font-size:32px;
      margin:10px 0 0;
    }

    .label {
      font-size:14px;
      opacity:0.7;
    }

    .chart-box {
      background:#1e293b;
      padding:25px;
      border-radius:15px;
      margin-bottom:30px;
    }

    canvas {
      max-width:100%;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>📊 Social Media Tracking</h1>

  <div class="cards">
    <div class="card">
      <div class="label">Total Clicks</div>
      <h2 id="total">0</h2>
    </div>

    <div class="card">
      <div class="label">Today Clicks</div>
      <h2 id="today">0</h2>
    </div>
  </div>

  <div class="chart-box">
    <h3>🌍 Top Countries</h3>
    <canvas id="countryChart"></canvas>
  </div>

  <div class="chart-box">
    <h3>📈 Daily Growth</h3>
    <canvas id="dailyChart"></canvas>
  </div>
</div>

<script>
async function loadStats(){
  const res = await fetch('/api/stats');
  const data = await res.json();
  document.getElementById('total').innerText = data.total;
  document.getElementById('today').innerText = data.today;
}

async function loadCountries(){
  const res = await fetch('/api/countries');
  const data = await res.json();

  new Chart(document.getElementById('countryChart'),{
    type:'bar',
    data:{
      labels:data.map(d=>d[0]),
      datasets:[{
        label:'Clicks',
        data:data.map(d=>d[1]),
        backgroundColor:'#3b82f6'
      }]
    },
    options:{
      plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{color:"white"}},
        y:{ticks:{color:"white"}}
      }
    }
  });
}

async function loadDaily(){
  const res = await fetch('/api/daily');
  const data = await res.json();

  new Chart(document.getElementById('dailyChart'),{
    type:'line',
    data:{
      labels:data.map(d=>d.date),
      datasets:[{
        label:'Clicks',
        data:data.map(d=>d.count),
        borderColor:'#10b981',
        backgroundColor:'rgba(16,185,129,0.2)',
        fill:true,
        tension:0.3
      }]
    },
    options:{
      plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{color:"white"}},
        y:{ticks:{color:"white"}}
      }
    }
  });
}

loadStats();
loadCountries();
loadDaily();
</script>

</body>
</html>
