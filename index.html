<!DOCTYPE html>
<html>
<head>
  <title>Tracking Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing:border-box; }

    body {
      margin:0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg,#0f172a,#1e293b,#0f172a);
      color:white;
    }

    .container {
      padding:40px;
    }

    h1 {
      font-weight:600;
      margin-bottom:40px;
      letter-spacing:1px;
    }

    .cards {
      display:grid;
      grid-template-columns: repeat(auto-fit,minmax(260px,1fr));
      gap:25px;
      margin-bottom:50px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(15px);
      padding:25px;
      border-radius:20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      transition:0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card-header {
      display:flex;
      align-items:center;
      justify-content:space-between;
    }

    .icon {
      width:50px;
      height:50px;
      border-radius:15px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:22px;
      font-weight:bold;
    }

    .purple { background:linear-gradient(135deg,#7c3aed,#9333ea); }
    .green { background:linear-gradient(135deg,#10b981,#059669); }

    .value {
      font-size:34px;
      margin-top:15px;
      font-weight:600;
    }

    .chart-box {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(15px);
      padding:30px;
      border-radius:20px;
      margin-bottom:40px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    h3 {
      margin-bottom:20px;
      font-weight:500;
    }

    /* Style cho bảng quốc gia */
    .countries-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    .countries-table th {
      text-align: left;
      padding: 12px;
      background: rgba(124, 58, 237, 0.3);
      color: white;
      font-weight: 600;
    }

    .countries-table td {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .countries-table tr:hover {
      background: rgba(255,255,255,0.05);
    }

    .rank-badge {
      display: inline-block;
      width: 30px;
      height: 30px;
      background: rgba(124, 58, 237, 0.3);
      border-radius: 50%;
      text-align: center;
      line-height: 30px;
      font-weight: 600;
    }

    .country-flag {
      font-size: 20px;
      margin-right: 10px;
    }

    .count-bar {
      height: 8px;
      background: rgba(124, 58, 237, 0.3);
      border-radius: 4px;
      margin-top: 5px;
      position: relative;
    }

    .count-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #7c3aed, #9333ea);
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    .total-countries {
      margin-bottom: 15px;
      color: #94a3b8;
      font-size: 14px;
    }

    .search-box {
      margin-bottom: 20px;
    }

    .search-box input {
      width: 100%;
      padding: 12px 20px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      color: white;
      font-size: 16px;
    }

    .search-box input::placeholder {
      color: #94a3b8;
    }

    .search-box input:focus {
      outline: none;
      border-color: #7c3aed;
    }
  </style>
</head>
<body>

<div class="container">

  <h1>📊 Social Media Tracking</h1>

  <div class="cards">
    <div class="card">
      <div class="card-header">
        <div>Total Clicks</div>
        <div class="icon purple">📈</div>
      </div>
      <div class="value" id="total">0</div>
    </div>

    <div class="card">
      <div class="card-header">
        <div>Today Clicks</div>
        <div class="icon green">📅</div>
      </div>
      <div class="value" id="today">0</div>
    </div>
    
    <div class="card">
      <div class="card-header">
        <div>Countries</div>
        <div class="icon purple">🌍</div>
      </div>
      <div class="value" id="totalCountries">0</div>
    </div>
  </div>

  <div class="chart-box">
    <h3>🌍 Daily Growth</h3>
    <canvas id="dailyChart"></canvas>
  </div>

  <div class="chart-box">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
      <h3>🌍 All Countries</h3>
      <div class="total-countries" id="countryCount">Total: 0 countries</div>
    </div>
    
    <div class="search-box">
      <input type="text" id="countrySearch" placeholder="🔍 Search country..." onkeyup="filterCountries()">
    </div>
    
    <table class="countries-table" id="countriesTable">
      <thead>
        <tr>
          <th>#</th>
          <th>Country</th>
          <th>Clicks</th>
          <th>Percentage</th>
        </tr>
      </thead>
      <tbody id="countriesBody">
        <!-- Data will be inserted here -->
      </tbody>
    </table>
  </div>

</div>

<script>
let allCountriesData = [];
let totalClicks = 0;

async function loadStats(){
  const res = await fetch('/api/stats');
  const data = await res.json();
  document.getElementById('total').innerText = data.total;
  document.getElementById('today').innerText = data.today;
  totalClicks = data.total;
}

async function loadAllCountries(){
  const res = await fetch('/api/countries');
  const data = await res.json();
  allCountriesData = data;
  
  document.getElementById('totalCountries').innerText = data.length;
  document.getElementById('countryCount').innerText = `Total: ${data.length} countries`;
  
  displayCountries(data);
}

function displayCountries(countries) {
  const tbody = document.getElementById('countriesBody');
  tbody.innerHTML = '';
  
  let maxClicks = countries.length > 0 ? countries[0][1] : 0;
  
  countries.forEach((country, index) => {
    const countryName = country[0];
    const clicks = country[1];
    const percentage = ((clicks / totalClicks) * 100).toFixed(1);
    
    // Flag emoji (simplified - you can use a library for accurate flags)
    const flagEmoji = getFlagEmoji(countryName);
    
    const row = document.createElement('tr');
    row.innerHTML = `
      <td><span class="rank-badge">${index + 1}</span></td>
      <td>
        <span style="display: flex; align-items: center;">
          <span class="country-flag">${flagEmoji}</span>
          <span>${countryName}</span>
        </span>
      </td>
      <td><strong>${clicks.toLocaleString()}</strong></td>
      <td style="width: 30%;">
        ${percentage}%
        <div class="count-bar">
          <div class="count-bar-fill" style="width: ${(clicks / maxClicks) * 100}%;"></div>
        </div>
      </td>
    `;
    tbody.appendChild(row);
  });
}

// Simple function to get flag emoji (you might want to use a proper library)
function getFlagEmoji(countryName) {
  const flagMap = {
    'Vietnam': '🇻🇳',
    'United States': '🇺🇸',
    'United Kingdom': '🇬🇧',
    'Japan': '🇯🇵',
    'South Korea': '🇰🇷',
    'China': '🇨🇳',
    'France': '🇫🇷',
    'Germany': '🇩🇪',
    'Italy': '🇮🇹',
    'Spain': '🇪🇸',
    'Russia': '🇷🇺',
    'Brazil': '🇧🇷',
    'India': '🇮🇳',
    'Canada': '🇨🇦',
    'Australia': '🇦🇺',
    'Unknown': '🌍'
  };
  return flagMap[countryName] || '🌍';
}

function filterCountries() {
  const searchText = document.getElementById('countrySearch').value.toLowerCase();
  
  if (!searchText) {
    displayCountries(allCountriesData);
    return;
  }
  
  const filtered = allCountriesData.filter(country => 
    country[0].toLowerCase().includes(searchText)
  );
  
  displayCountries(filtered);
}

async function loadDaily(){
  const res = await fetch('/api/daily');
  const data = await res.json();

  new Chart(document.getElementById('dailyChart'),{
    type:'line',
    data:{
      labels:data.map(d=>d.date),
      datasets:[{
        label: 'Clicks',
        data:data.map(d=>d.count),
        borderColor:'#10b981',
        backgroundColor:'rgba(16,185,129,0.3)',
        fill:true,
        tension:0.4
      }]
    },
    options:{
      plugins:{
        legend:{display:false}
      },
      scales:{
        x:{
          ticks:{color:"white"},
          grid:{color:'rgba(255,255,255,0.1)'}
        },
        y:{
          ticks:{color:"white"},
          grid:{color:'rgba(255,255,255,0.1)'},
          beginAtZero:true
        }
      }
    }
  });
}

// Load all data
loadStats();
loadAllCountries();
loadDaily();
</script>

</body>
</html>
