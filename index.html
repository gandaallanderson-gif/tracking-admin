<!DOCTYPE html>
<html>
<head>
  <title>Tracking Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing:border-box; }

    body {
      margin:0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg,#0f172a,#1e293b,#0f172a);
      color:white;
    }

    .container {
      padding:40px;
    }

    h1 {
      font-weight:600;
      margin-bottom:40px;
      letter-spacing:1px;
    }

    .cards {
      display:grid;
      grid-template-columns: repeat(auto-fit,minmax(260px,1fr));
      gap:25px;
      margin-bottom:50px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(15px);
      padding:25px;
      border-radius:20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      transition:0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card-header {
      display:flex;
      align-items:center;
      justify-content:space-between;
    }

    .icon {
      width:50px;
      height:50px;
      border-radius:15px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:22px;
      font-weight:bold;
    }

    .purple { background:linear-gradient(135deg,#7c3aed,#9333ea); }
    .green { background:linear-gradient(135deg,#10b981,#059669); }

    .value {
      font-size:34px;
      margin-top:15px;
      font-weight:600;
    }

    .chart-box {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(15px);
      padding:30px;
      border-radius:20px;
      margin-bottom:40px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    h3 {
      margin-bottom:20px;
      font-weight:500;
    }
  </style>
</head>
<body>

<div class="container">

  <h1>📊 Social Media Tracking</h1>

  <div class="cards">
    <div class="card">
      <div class="card-header">
        <div>Total Clicks</div>
        <div class="icon purple">📈</div>
      </div>
      <div class="value" id="total">0</div>
    </div>

    <div class="card">
      <div class="card-header">
        <div>Today Clicks</div>
        <div class="icon green">📅</div>
      </div>
      <div class="value" id="today">0</div>
    </div>
  </div>

  <div class="chart-box">
    <h3>🌍 Top Countries</h3>
    <canvas id="countryChart"></canvas>
  </div>

  <div class="chart-box">
    <h3>📊 Daily Growth</h3>
    <canvas id="dailyChart"></canvas>
  </div>

</div>

<script>
async function loadStats(){
  const res = await fetch('/api/stats');
  const data = await res.json();
  document.getElementById('total').innerText = data.total;
  document.getElementById('today').innerText = data.today;
}

async function loadCountries(){
  const res = await fetch('/api/countries');
  const data = await res.json();

  new Chart(document.getElementById('countryChart'),{
    type:'bar',
    data:{
      labels:data.map(d=>d[0]),
      datasets:[{
        data:data.map(d=>d[1]),
        backgroundColor:'#7c3aed',
        borderRadius:10
      }]
    },
    options:{
      plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{color:"white"}},
        y:{ticks:{color:"white"}}
      }
    }
  });
}

async function loadDaily(){
  const res = await fetch('/api/daily');
  const data = await res.json();

  new Chart(document.getElementById('dailyChart'),{
    type:'line',
    data:{
      labels:data.map(d=>d.date),
      datasets:[{
        data:data.map(d=>d.count),
        borderColor:'#10b981',
        backgroundColor:'rgba(16,185,129,0.3)',
        fill:true,
        tension:0.4
      }]
    },
    options:{
      plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{color:"white"}},
        y:{ticks:{color:"white"}}
      }
    }
  });
}

loadStats();
loadCountries();
loadDaily();
</script>

</body>
</html>
